<div class="flex flex-col h-screen bg-background overflow-hidden">
  <!-- Top Navigation Bar -->
  <header class="fixed top-0 left-0 right-0 z-50 h-16 flex items-center justify-between px-lg bg-surface/40 backdrop-blur-md border-b border-white/5 flex-shrink-0">
    <div class="flex items-center gap-md">
      <a routerLink="/dashboard" class="font-display text-headline-md font-black text-primary tracking-tighter">Pulse</a>
      <div class="hidden md:flex gap-lg ml-lg">
        <a routerLink="/discover" class="font-label text-label-md text-on-surface-variant hover:text-on-surface transition-all">Discover</a>
        <a routerLink="/premium" class="font-label text-label-md text-on-surface-variant hover:text-on-surface transition-all">Premium</a>
      </div>
    </div>
    <div class="flex items-center gap-sm">
      <div class="flex items-center gap-xs bg-error/10 border border-error/20 px-md py-xs rounded-full">
        <span class="w-2 h-2 bg-error rounded-full pulse-animation"></span>
        <span class="font-label text-label-sm text-error uppercase tracking-wider">LIVE</span>
        <span class="font-label text-label-sm text-on-surface-variant">{{ matchTime }}</span>
      </div>
      <a routerLink="/dashboard" class="p-sm rounded-full hover:bg-white/5 transition-all">
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex flex-1 pt-16 overflow-hidden">
    <!-- Video Area -->
    <div class="flex-1 relative bg-surface-container-lowest overflow-hidden">
      <!-- Peer Video (Main) -->
      <div class="absolute inset-0">
        <img class="w-full h-full object-cover" src="https://i.pravatar.cc/800?img=33" alt="Peer Video" />
        <div class="absolute inset-0 border-2 border-secondary/30 neon-glow-cyan transition-transform duration-75"
          [style.transform]="'translate(' + glowX + 'px, ' + glowY + 'px)'"></div>
      </div>

      <!-- User Info Overlay (Top) -->
      <div class="absolute top-lg left-lg z-10 flex items-center gap-sm">
        <div class="glass-panel px-md py-sm rounded-xl border border-white/10 flex items-center gap-sm">
          <span class="material-symbols-outlined text-secondary text-sm">location_on</span>
          <span class="font-label text-label-md text-on-surface">Paris, France 🇫🇷</span>
        </div>
        <div class="glass-panel px-sm py-sm rounded-xl border border-white/10 flex gap-xs">
          <span class="bg-surface/60 px-sm py-1 rounded-full font-label text-label-sm text-secondary border border-secondary/30">#Music</span>
          <span class="bg-surface/60 px-sm py-1 rounded-full font-label text-label-sm text-primary border border-primary/30">#Art</span>
        </div>
      </div>

      <!-- Self PiP Video (Bottom Left) -->
      <div class="absolute bottom-24 left-lg z-20 w-32 md:w-44 aspect-video rounded-2xl overflow-hidden border-2 border-surface shadow-xl">
        <img class="w-full h-full object-cover" src="https://i.pravatar.cc/200?img=7" alt="Self Video" />
        <div *ngIf="isMuted" class="absolute inset-0 flex items-center justify-center bg-black/50">
          <span class="material-symbols-outlined text-error">mic_off</span>
        </div>
        <div *ngIf="isCameraOff" class="absolute inset-0 bg-surface-container flex items-center justify-center">
          <span class="material-symbols-outlined text-on-surface-variant text-3xl">videocam_off</span>
        </div>
      </div>

      <!-- Control Bar (Bottom) -->
      <div class="absolute bottom-0 left-0 right-0 p-lg flex items-center justify-between z-20">
        <div class="flex items-center gap-sm">
          <!-- Mute -->
          <button (click)="isMuted = !isMuted"
            class="w-12 h-12 rounded-full flex items-center justify-center transition-all active:scale-95"
            [ngClass]="isMuted ? 'bg-error/20 border border-error/40 text-error' : 'glass-panel border border-white/10 text-on-surface hover:bg-white/10'">
            <span class="material-symbols-outlined">{{ isMuted ? 'mic_off' : 'mic' }}</span>
          </button>
          <!-- Camera -->
          <button (click)="isCameraOff = !isCameraOff"
            class="w-12 h-12 rounded-full flex items-center justify-center transition-all active:scale-95"
            [ngClass]="isCameraOff ? 'bg-error/20 border border-error/40 text-error' : 'glass-panel border border-white/10 text-on-surface hover:bg-white/10'">
            <span class="material-symbols-outlined">{{ isCameraOff ? 'videocam_off' : 'videocam' }}</span>
          </button>
          <!-- Effects -->
          <button class="w-12 h-12 rounded-full glass-panel border border-white/10 text-on-surface-variant flex items-center justify-center hover:bg-white/10 transition-all active:scale-95">
            <span class="material-symbols-outlined">auto_awesome</span>
          </button>
        </div>

        <!-- Skip / End -->
        <button class="px-xl py-md bg-primary text-on-primary rounded-full font-headline text-headline-md flex items-center gap-sm neon-glow-primary hover:brightness-110 active:scale-95 transition-all">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">skip_next</span>
          Next Match
        </button>

        <div class="flex items-center gap-sm">
          <!-- Add Friend -->
          <button class="w-12 h-12 rounded-full glass-panel border border-white/10 text-tertiary flex items-center justify-center hover:bg-tertiary/10 transition-all active:scale-95">
            <span class="material-symbols-outlined">person_add</span>
          </button>
          <!-- Report -->
          <button class="w-12 h-12 rounded-full glass-panel border border-white/10 text-on-surface-variant flex items-center justify-center hover:bg-error/10 hover:text-error transition-all active:scale-95">
            <span class="material-symbols-outlined">flag</span>
          </button>
          <!-- Toggle Chat -->
          <button (click)="chatOpen = !chatOpen" class="w-12 h-12 rounded-full glass-panel border border-white/10 text-secondary flex items-center justify-center hover:bg-secondary/10 transition-all active:scale-95">
            <span class="material-symbols-outlined">chat_bubble</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Chat Panel (Right) -->
    <div *ngIf="chatOpen" class="w-80 flex flex-col border-l border-white/10 bg-surface/60 backdrop-blur-xl hidden md:flex">
      <div class="p-md border-b border-white/10">
        <h3 class="font-headline text-headline-md text-on-surface">Live Chat</h3>
      </div>
      <div class="flex-1 overflow-y-auto p-md space-y-sm">
        <div *ngFor="let msg of chatMessages"
          class="flex"
          [ngClass]="msg.self ? 'justify-end' : 'justify-start'">
          <div class="max-w-[80%] px-md py-sm rounded-2xl text-sm"
            [ngClass]="msg.self ? 'bg-primary text-on-primary rounded-br-sm' : 'bg-surface-container text-on-surface rounded-bl-sm border border-white/5'">
            {{ msg.text }}
          </div>
        </div>
      </div>
      <div class="p-md border-t border-white/10 flex gap-sm">
        <input [(ngModel)]="newChatMessage"
          class="flex-1 bg-surface-container/40 border border-white/5 rounded-full py-sm px-md text-on-surface text-sm placeholder:text-on-surface-variant/50 focus:outline-none focus:border-secondary transition-all"
          placeholder="Message..." type="text" />
        <button class="w-9 h-9 bg-secondary-container rounded-full flex items-center justify-center neon-glow-cyan hover:brightness-110 active:scale-95 transition-all">
          <span class="material-symbols-outlined text-on-secondary-container text-sm" style="font-variation-settings: 'FILL' 1;">send</span>
        </button>
      </div>
    </div>
  </div>
</div>
